<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a1f3d"/>
  <!-- Accent stripe -->
  <rect y="0" width="1200" height="8" fill="#f5a623"/>
  <!-- Bottom stripe -->
  <rect y="622" width="1200" height="8" fill="#f5a623"/>
  <!-- Left decorative block -->
  <rect x="0" y="0" width="8" height="630" fill="#f5a623"/>

  <!-- Wordmark -->
  <text x="80" y="230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif"
        font-size="80" font-weight="800" letter-spacing="-2" fill="#ffffff">Barrel</text>
  <text x="396" y="230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif"
        font-size="80" font-weight="800" letter-spacing="-2" fill="#f5a623">Compare</text>

  <!-- Tagline -->
  <text x="80" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif"
        font-size="32" font-weight="400" fill="rgba(255,255,255,0.65)">UK's independent barrel shipping comparison</text>

  <!-- Divider -->
  <rect x="80" y="320" width="120" height="4" fill="#f5a623" rx="2"/>

  <!-- Value props -->
  <text x="80" y="390" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif"
        font-size="28" font-weight="600" fill="#ffffff">✓ Real prices &amp; transit times</text>
  <text x="80" y="435" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif"
        font-size="28" font-weight="600" fill="#ffffff">✓ Jamaica · Trinidad · Barbados · Guyana &amp; more</text>
  <text x="80" y="480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif"
        font-size="28" font-weight="600" fill="#ffffff">✓ Free · Independent · No obligation</text>

  <!-- URL badge -->
  <rect x="80" y="530" width="340" height="54" rx="27" fill="rgba(245,166,35,0.15)" stroke="#f5a623" stroke-width="1.5"/>
  <text x="250" y="565" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif"
        font-size="24" font-weight="700" fill="#f5a623">barrelcompare.co.uk</text>
</svg>
